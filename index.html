<!DOCTYPE html>
<html lang="en" class="overflow-x-hidden">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grantify - Empowering Families & Businesses</title>
    <meta name="description" content="Grantify helps businesses discover funding options and learn from community intelligence." />
    <meta property="og:site_name" content="Grantify" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Grantify" />
    <meta property="og:description" content="Discover funding options and learn from community intelligence." />
    <meta property="og:image" content="/og-default.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Grantify" />
    <meta name="twitter:description" content="Discover funding options and learn from community intelligence." />
    <meta name="twitter:image" content="/og-default.svg" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/favicon-32.png" type="image/png" sizes="32x32" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
    <link rel="preconnect" href="https://cdn-server.live">
    <link rel="dns-prefetch" href="https://cdn-server.live">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      (function () {
        try {
          const stored = localStorage.getItem('grantify_theme');
          const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          const shouldUseDark = stored ? stored === 'dark' : prefersDark;
          if (shouldUseDark) document.documentElement.classList.add('dark');
        } catch {
          // no-op
        }
      })();
    </script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5375979347378755" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              grantify: {
                green: '#006400',
                gold: '#FFD700',
                light: '#f3f4f6',
              }
            },
            fontFamily: {
              sans: ['Open Sans', 'sans-serif'],
              heading: ['Roboto', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <style>
      body {
        font-family: 'Open Sans', sans-serif;
      }
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Roboto', sans-serif;
      }

      /* Horizontal ticker (Latest News) */
      @keyframes ticker-marquee {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }
      .ticker-marquee {
        animation: ticker-marquee 40s linear infinite;
        will-change: transform;
      }

      /* Blog post / AI article HTML styling (ReactQuill output) */
      .quill-content {
        overflow-wrap: break-word;
        word-break: normal;
        -webkit-hyphens: auto;
        hyphens: auto;
        line-height: 1.8;
      }
      .quill-content p {
        margin: 0.9em 0;
      }
      .quill-content h1,
      .quill-content h2,
      .quill-content h3 {
        font-weight: 800;
        line-height: 1.25;
        margin: 1.25em 0 0.55em;
        -webkit-hyphens: none;
        hyphens: none;
        overflow-wrap: normal;
        word-break: normal;
      }
      .quill-content h1 { font-size: 2em; }
      .quill-content h2 { font-size: 1.6em; }
      .quill-content h3 { font-size: 1.25em; }
      .quill-content ul,
      .quill-content ol {
        padding-left: 1.4em;
        margin: 0.9em 0;
      }
      /* Star bullets for unordered lists */
      .quill-content ul {
        list-style: none;
        padding-left: 0;
      }
      .quill-content ul > li {
        position: relative;
        padding-left: 1.35em;
        margin: 0.35em 0;
      }
      .quill-content ul > li::before {
        content: '★';
        position: absolute;
        left: 0;
        top: 0.05em;
        font-size: 0.85em;
        color: rgba(0, 100, 0, 0.75);
      }
      .dark .quill-content ul > li::before {
        color: rgba(255, 215, 0, 0.7);
      }
      .quill-content ol > li { margin: 0.35em 0; }
      .quill-content blockquote {
        margin: 1em 0;
        padding: 0.8em 1em;
        border-left: 4px solid rgba(0,100,0,0.35);
        background: rgba(0,0,0,0.02);
        font-style: italic;
        position: relative;
        overflow: hidden;
      }
      .quill-content blockquote::before {
        content: '“';
        position: absolute;
        left: 0.2em;
        top: -0.1em;
        font-size: 6em;
        line-height: 1;
        color: rgba(0, 100, 0, 0.10);
        pointer-events: none;
      }
      .quill-content blockquote p {
        margin: 0.6em 0;
      }
      .quill-content blockquote p:first-child { margin-top: 0; }
      .quill-content blockquote p:last-child { margin-bottom: 0; }
      .dark .quill-content blockquote {
        background: rgba(255,255,255,0.04);
        border-left-color: rgba(255,215,0,0.35);
      }
      .dark .quill-content blockquote::before {
        color: rgba(255, 215, 0, 0.12);
      }
      .quill-content a { text-decoration: underline; }
      .quill-content img { max-width: 100%; height: auto; border-radius: 12px; }

      /* Admin editor (ReactQuill) - sticky toolbar + dark mode */
      .admin-quill .ql-toolbar.ql-snow {
        position: sticky;
        top: 0;
        z-index: 40;
      }
      .admin-quill .ql-toolbar.ql-snow,
      .admin-quill .ql-container.ql-snow {
        border-color: rgba(0,0,0,0.08);
      }
      .dark .admin-quill .ql-toolbar.ql-snow {
        background: #0b1220;
        border-color: rgba(255,255,255,0.08);
      }
      .dark .admin-quill .ql-container.ql-snow {
        background: #030712;
        border-color: rgba(255,255,255,0.08);
        color: #e5e7eb;
      }
      .dark .admin-quill .ql-editor.ql-blank::before { color: rgba(229,231,235,0.45); }
      .dark .admin-quill .ql-stroke { stroke: #e5e7eb; }
      .dark .admin-quill .ql-fill { fill: #e5e7eb; }
      .dark .admin-quill .ql-picker { color: #e5e7eb; }
      .dark .admin-quill .ql-picker-options { background: #0b1220; border-color: rgba(255,255,255,0.08); }

      @keyframes slide-up {
        from { transform: translateY(100%); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      .animate-slide-up {
        animation: slide-up 0.5s ease-out forwards;
      }
    </style>
  </head>
  <body class="bg-gray-50 text-gray-800 dark:bg-gray-950 dark:text-gray-100 overflow-x-hidden">
    <!-- Monetag/Admin scripts will be injected here via Layout/Head slot -->
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
